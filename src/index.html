<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetVidRew</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- 上方主区域：视频 + 右侧按钮 -->
    <div id="main-area">

      <!-- 视频区域（视频窗口 Win32 子窗口渲染于其上层，此处无 HTML 内容） -->
      <div id="video-area"></div>

      <!-- 右侧按钮栏（宽度 20%，高度 100%） -->
      <div id="right-panel">

        <!-- 文件名显示区 -->
        <div id="filename-display"></div>

        <!-- 第1行：入点 / 出点（新功能·双按钮） -->
        <div class="btn-row btn-row-double">
          <button id="btn-mark-in"  class="btn btn-mark" title="标记入点 (I)">⬅ 入点</button>
          <button id="btn-mark-out" class="btn btn-mark" title="标记出点 (O)">出点 ➡</button>
        </div>

        <!-- 第2行：裁剪（新功能·单按钮） -->
        <div class="btn-row btn-row-single">
          <button id="btn-clip" class="btn btn-clip" title="裁剪并导出 (C)">✂ 裁剪</button>
        </div>

        <!-- 第3行：快退 / 快进（原有·双按钮） -->
        <div class="btn-row btn-row-double">
          <button id="btn-rewind"  class="btn" title="后退 1/7 影片长度 (←)">⏪ 快退</button>
          <button id="btn-forward" class="btn" title="前进 1/7 影片长度 (→)">⏩ 快进</button>
        </div>

        <!-- 第4行：上一个 / 下一个（新功能·双按钮） -->
        <div class="btn-row btn-row-double">
          <button id="btn-prev" class="btn" title="上一个视频 ([)">⏮ 上一个</button>
          <button id="btn-next" class="btn" title="下一个视频 (])">下一个 ⏭</button>
        </div>

        <!-- 第5行：暂停（原有·单按钮） -->
        <div class="btn-row btn-row-single">
          <button id="btn-play" class="btn btn-play" title="播放/暂停 (空格)">▶ 播放</button>
        </div>

        <!-- 第5行：删除（原有·单按钮） -->
        <div class="btn-row btn-row-single">
          <button id="btn-delete" class="btn btn-danger" title="删除当前视频 (Del)">🗑 删除</button>
        </div>

      </div>

    </div>

    <!-- 底部控制栏（固定高度） -->
    <div id="controls">

      <!-- 进度条行（含入/出点标记层） -->
      <div class="ctrl-row progress-row">
        <div id="progress-wrap">
          <input
            id="progress-bar"
            type="range"
            min="0" max="100" value="0" step="0.1"
            class="slider progress-slider"
          />
          <!-- 入出点区间高亮及标记线（叠加在进度条上） -->
          <div id="clip-overlay">
            <div id="clip-range"></div>
            <div id="clip-in-marker"  class="clip-marker clip-marker-in"></div>
            <div id="clip-out-marker" class="clip-marker clip-marker-out"></div>
          </div>
        </div>
        <span id="time-display" class="time-label">0:00 / 0:00</span>
      </div>

      <!-- 音量行 -->
      <div class="ctrl-row">
        <span class="vol-icon">🔊</span>
        <input
          id="volume-bar"
          type="range"
          min="0" max="100" value="80" step="1"
          class="slider volume-slider"
        />
        <span id="volume-display" class="vol-label">80</span>
      </div>

    </div>

    <!-- 状态消息（绝对定位，叠加在控制栏上方，不被视频窗口遮挡） -->
    <div id="status-msg"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>
